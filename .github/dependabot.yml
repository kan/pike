version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      codemirror:
        patterns:
          - "@codemirror/*"
          - "@lezer/*"
      tauri:
        patterns:
          - "@tauri-apps/*"
      xterm:
        patterns:
          - "@xterm/*"

  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
