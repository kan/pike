# Ignore advisories in transitive dependencies that Pike cannot fix directly.
# These are upstream issues in Tauri's dependency tree.
# Review periodically and remove once upstream releases fixes.

[advisories]
ignore = [
    # rustls-webpki: URI name constraints — via tauri (reqwest → rustls)
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    # rand 0.9.2 unsound with custom logger — via tauri-plugin-notification
    "RUSTSEC-2026-0097",
    # quick-xml < 0.41 DoS — via tauri-winrt-notification (0.37) / plist (0.38).
    # Pike only parses internally generated notification XML and plists.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
