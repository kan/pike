[package]
name = "app"
version = "0.1.0"
description = "A Tauri App"
authors = ["you"]
license = ""
repository = ""
edition = "2021"
rust-version = "1.77.2"
default-run = "app"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.4", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.0", features = [] }
tauri-plugin-log = "2"
portable-pty = "0.8"
tokio = { version = "1", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
bollard = "0.18"
futures-util = "0.3"
base64 = "0.22.1"
encoding_rs = "0.8.35"
serde_yaml = "0.9.34"
tauri-plugin-window-state = "2.4.1"
font-kit = "0.14.3"

[[bin]]
name = "verify_pty"
path = "src/bin/verify_pty.rs"

[[bin]]
name = "verify_tmux"
path = "src/bin/verify_tmux.rs"

[[bin]]
name = "verify_bollard"
path = "src/bin/verify_bollard.rs"
